<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEXICO 2026</title>
    <style>
        :root { --neon-pink: #ff007f; --ocean-blue: #00d4ff; --sun-yellow: #fdbb2d; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Impact', sans-serif; background: black; color: white; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden; }
        .hero { background: linear-gradient(to bottom, rgba(0,0,0,0.6), black), url('https://images.unsplash.com/photo-1552074284-5e88ef1aef18?q=80&w=1000&auto=format&fit=crop'); background-size: cover; padding: 60px 10px; text-align: center; border-bottom: 5px solid var(--neon-pink); }
        .main-head { font-size: 5rem; line-height: 0.85; text-shadow: 6px 6px var(--neon-pink); margin-bottom: 20px; text-transform: uppercase; }
        #countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; font-family: sans-serif; margin-bottom: 20px; }
        .unit span { display: block; font-size: 2.5rem; color: var(--sun-yellow); }
        .unit { font-size: 0.7rem; font-weight: bold; }
        .weather-box { margin: 10px auto; max-width: 320px; min-height: 150px; border-radius: 15px; border: 1px solid var(--ocean-blue); background: rgba(0,0,0,0.5); }
        .container { padding: 15px; font-family: sans-serif; }
        .card { background: var(--glass); padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(15px); }
        h3 { margin: 0 0 15px 0; color: var(--ocean-blue); border-bottom: 2px solid var(--ocean-blue); display: inline-block; text-transform: uppercase; }
        .day-header { color: var(--neon-pink); font-size: 2rem; border-bottom: 2px solid var(--neon-pink); margin: 25px 0 10px 0; text-transform: uppercase; }
        .itin-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .itin-time { color: var(--ocean-blue); font-weight: 900; width: 95px; font-size: 1rem; flex-shrink: 0; }
        .itin-act { flex-grow: 1; font-weight: bold; font-size: 1.1rem; }
        .form-box { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        input, select { background: rgba(0,0,0,0.4); border: 2px solid var(--ocean-blue); color: #fff; padding: 12px; border-radius: 12px; font-size: 1rem; }
        .full-btn { background: var(--ocean-blue); border: none; padding: 15px; border-radius: 12px; font-family: 'Impact'; font-size: 1.2rem; cursor: pointer; color: black; }
        .del { color: var(--neon-pink); font-size: 1.8rem; cursor: pointer; padding-left: 10px; }
        .vibe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .vibe-btn { background: rgba(255,255,255,0.1); border: 1px solid #fff; color: #fff; padding: 12px 5px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .dale-fab { position: fixed; bottom: 20px; right: 20px; width: 85px; height: 85px; border-radius: 50%; background: var(--neon-pink); border: 4px solid #fff; color: #fff; font-family: 'Impact'; font-size: 1.3rem; box-shadow: 0 0 25px var(--neon-pink); z-index: 1000; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .name-btn { margin: 10px; padding: 20px; width: 280px; background: var(--sun-yellow); border: none; border-radius: 20px; font-size: 1.4rem; font-family: 'Impact'; color: black; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color:var(--neon-pink); font-size: 5rem;">DALE!</h1>
    <div id="nameList">Loading...</div>
</div>

<div class="hero">
    <div class="main-head">MEXICO<br>2026</div>
    <div id="countdown">
        <div class="unit"><span id="days">00</span>DAYS</div>
        <div class="unit"><span id="hours">00</span>HRS</div>
        <div class="unit"><span id="mins">00</span>MIN</div>
        <div class="unit"><span id="secs">00</span>SEC</div>
    </div>
    <div class="weather-box">
        <a class="weatherwidget-io" href="https://forecast7.com/en/21d16n86d85/cancun/?unit=us" data-label_1="CANCUN" data-label_2="WEATHER" data-theme="pure" data-basecolor="rgba(0,0,0,0)" data-textcolor="#00d4ff" >WEATHER</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3>📅 THE GAMEPLAN</h3>
        <div id="itinList"></div>
        <div class="form-box">
            <div style="display:flex; gap:10px;">
                <select id="inDay" style="flex:1;">
                    <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                    <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
                </select>
                <input type="text" id="inTime" placeholder="3:00 PM" style="width:40%;">
            </div>
            <input type="text" id="inAct" placeholder="What are we doing?">
            <button onclick="addItin()" class="full-btn">ADD TO PLAN</button>
        </div>
    </div>

    <div class="card">
        <h3 style="color:var(--neon-pink); border-color:var(--neon-pink);">🎒 PACKING LIST</h3>
        <div id="packingList"></div>
        <div class="form-box">
            <input type="text" id="pIn" placeholder="Pack this..." style="border-color:var(--neon-pink)">
            <button onclick="addPack()" class="full-btn" style="background:var(--neon-pink); color:white;">ADD</button>
        </div>
    </div>

    <div class="card">
        <h3 style="color:var(--sun-yellow); border-color:var(--sun-yellow);">🍹 GROUP VIBES</h3>
        <div id="statusList"></div>
        <div class="vibe-grid">
            <button class="vibe-btn" onclick="updateVibe('🍹 Drinkin')">🍹 Drinkin</button>
            <button class="vibe-btn" onclick="updateVibe('🌊 Beach')">🌊 Beach</button>
            <button class="vibe-btn" onclick="updateVibe('💃 Dale!')">💃 Dale!</button>
        </div>
    </div>
</div>

<button class="dale-fab" id="musicBtn" onclick="toggleMusic()">DALE!</button>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMOXrS-s6pIBlrHnaZxPSoojFoQMU-Z2rK-GrKLb41WqZk52xU1Yfm-ZdWKgzQXbdR/exec'; 
    let myName = localStorage.getItem('mx_name');
    
    // Using a different audio source to ensure no dead links
    const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'); 
    audio.loop = true;

    function toggleMusic() { 
        const btn = document.getElementById('musicBtn');
        if (audio.paused) { 
            // The "Force Play" logic
            audio.play().then(() => {
                btn.innerText = "STOP"; 
                btn.style.background = "#58cc02"; 
            }).catch(e => {
                // If blocked, wait for user to touch again
                btn.innerText = "TAP AGAIN";
            });
        } else { 
            audio.pause(); 
            btn.innerText = "DALE!"; 
            btn.style.background = "var(--neon-pink)"; 
        }
    }

    function renderItinerary(rows) {
        const listDiv = document.getElementById('itinList');
        listDiv.innerHTML = '';
        const grouped = {};
        if (!rows || rows.length < 2) return;

        for (let i = 1; i < rows.length; i++) {
            const d = rows[i][0], t = rows[i][1], a = rows[i][2];
            if (!a) continue;
            if (!grouped[d]) grouped[d] = [];
            grouped[d].push({ t, a });
        }

        ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"].forEach(day => {
            if (grouped[day]) {
                listDiv.innerHTML += `<div class="day-header">${day}</div>`;
                grouped[day].forEach(item => {
                    listDiv.innerHTML += `
                    <div class="itin-row">
                        <span class="itin-time">${item.t || '--'}</span>
                        <span class="itin-act">${item.a}</span>
                        <span class="del" onclick="deleteItin('${item.a.replace(/'/g, "\\'")}')">×</span>
                    </div>`;
                });
            }
        });
    }

    async function fetchData() {
        const res = await fetch(SCRIPT_URL + '?action=getData&v=' + Date.now());
        const data = await res.json();
        if (myName) document.getElementById('overlay').style.display = 'none';
        else {
            document.getElementById('nameList').innerHTML = data.status.map(row => `<button class="name-btn" onclick="setName('${row[0]}')">${row[0]}</button>`).join('');
        }
        document.getElementById('statusList').innerHTML = data.status.map(row => `<div>${row[0]}: ${row[1] || 'Chillin'}</div>`).join('');
        renderItinerary(data.itinerary);
    }

    async function addItin() {
        const d = document.getElementById('inDay').value, t = document.getElementById('inTime').value, a = document.getElementById('inAct').value;
        if(!a) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addItin', day: d, time: t, activity: a }) });
        document.getElementById('inAct').value = ''; document.getElementById('inTime').value = '';
        setTimeout(fetchData, 1200);
    }

    async function deleteItin(act) {
        if(!confirm("Delete?")) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delItin', activity: act }) });
        setTimeout(fetchData, 1000);
    }

    let pItems = JSON.parse(localStorage.getItem('mx_p')) || [];
    function renderP() {
        document.getElementById('packingList').innerHTML = pItems.map((it, i) => `<div class="pack-item"><span>${it}</span><span class="del" onclick="remP(${i})">×</span></div>`).join('');
        localStorage.setItem('mx_p', JSON.stringify(pItems));
    }
    function addPack() { const i = document.getElementById('pIn'); if(i.value){pItems.push(i.value); i.value=''; renderP();}}
    function remP(i) { pItems.splice(i,1); renderP(); }

    async function updateVibe(v) {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: myName, vibe: v }) });
        setTimeout(fetchData, 1200);
    }

    function setName(n) { localStorage.setItem('mx_name', n); myName = n; fetchData(); }
    
    // Corrected Weather Script Loader
    !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');

    setInterval(() => {
        const diff = new Date("April 13, 2026 16:00:00 EST").getTime() - new Date().getTime();
        document.getElementById('days').innerText = Math.max(0, Math.floor(diff / 86400000)).toString().padStart(2, '0');
        document.getElementById('hours').innerText = Math.max(0, Math.floor((diff % 86400000) / 3600000)).toString().padStart(2, '0');
        document.getElementById('mins').innerText = Math.max(0, Math.floor((diff % 3600000) / 60000)).toString().padStart(2, '0');
        document.getElementById('secs').innerText = Math.max(0, Math.floor((diff % 60000) / 1000)).toString().padStart(2, '0');
    }, 1000);

    renderP(); fetchData();
</script>
</body>
</html>
