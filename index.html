<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEXICO 2026</title>
    <style>
        :root { --neon-pink: #ff007f; --ocean-blue: #00d4ff; --sun-yellow: #fdbb2d; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Impact', sans-serif; background: black; color: white; min-height: 100vh; padding-bottom: 50px; }
        .hero { background: linear-gradient(to bottom, rgba(0,0,0,0.6), black), url('https://images.unsplash.com/photo-1552074284-5e88ef1aef18?q=80&w=1000&auto=format&fit=crop'); background-size: cover; padding: 60px 10px; text-align: center; border-bottom: 5px solid var(--neon-pink); }
        .main-head { font-size: 5rem; line-height: 0.85; text-shadow: 6px 6px var(--neon-pink); margin-bottom: 20px; text-transform: uppercase; }
        #countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; font-family: sans-serif; margin-bottom: 20px; }
        .unit span { display: block; font-size: 2.5rem; color: var(--sun-yellow); }
        .unit { font-size: 0.7rem; font-weight: bold; }
        .weather-box { margin: 10px auto; max-width: 320px; border-radius: 15px; border: 1px solid var(--ocean-blue); background: rgba(0,0,0,0.5); min-height: 140px; }
        .container { padding: 15px; font-family: sans-serif; }
        .card { background: var(--glass); padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(15px); }
        h3 { margin: 0 0 15px 0; color: var(--ocean-blue); border-bottom: 2px solid var(--ocean-blue); display: inline-block; text-transform: uppercase; }
        
        /* Itinerary */
        .day-header { color: var(--neon-pink); font-size: 2rem; border-bottom: 2px solid var(--neon-pink); margin: 25px 0 10px 0; text-transform: uppercase; font-family: 'Impact'; }
        .itin-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .itin-time { color: var(--ocean-blue); font-weight: 900; width: 95px; font-size: 0.9rem; flex-shrink: 0; }
        .itin-act { flex-grow: 1; font-weight: bold; font-size: 1.1rem; }

        /* Packing */
        .pack-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .pack-item.done span { text-decoration: line-through; opacity: 0.5; }

        /* Vibe */
        .vibe-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--glass); }
        .vibe-status { color: var(--sun-yellow); font-weight: bold; }

        /* Spanish Flashcard */
        #spanishCard { background: var(--neon-pink); color: white; padding: 30px 15px; border-radius: 20px; text-align: center; cursor: pointer; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        #esText { font-size: 1.8rem; font-weight: bold; display: block; }
        #enText { font-size: 1.1rem; opacity: 0.9; margin-top: 10px; display: none; font-style: italic; }

        .form-box { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        input, select { background: rgba(0,0,0,0.4); border: 2px solid var(--ocean-blue); color: #fff; padding: 12px; border-radius: 12px; }
        .full-btn { background: var(--ocean-blue); border: none; padding: 15px; border-radius: 12px; font-family: 'Impact'; font-size: 1.2rem; cursor: pointer; color: black; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .name-btn { margin: 10px; padding: 20px; width: 280px; background: var(--sun-yellow); border: none; border-radius: 20px; font-size: 1.4rem; font-family: 'Impact'; color: black; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color:var(--neon-pink); font-size: 4rem;">MEXICO 2026</h1>
    <div id="nameList">Loading Crew...</div>
</div>

<div class="hero">
    <div class="main-head">MEXICO<br>2026</div>
    <div id="countdown">
        <div class="unit"><span id="days">00</span>DAYS</div>
        <div class="unit"><span id="hours">00</span>HRS</div>
        <div class="unit"><span id="mins">00</span>MIN</div>
        <div class="unit"><span id="secs">00</span>SEC</div>
    </div>
    <div class="weather-box">
        <a class="weatherwidget-io" href="https://forecast7.com/en/21d16n86d85/cancun/" data-label_1="CANCUN" data-label_2="WEATHER" data-mode="Current" data-theme="pure" data-basecolor="rgba(0,0,0,0)" data-textcolor="#00d4ff" data-units="us">CANCUN WEATHER</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3>📅 The Gameplan</h3>
        <div id="itinList"></div>
        <div class="form-box">
            <select id="inDay">
                <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
            </select>
            <input type="text" id="inTime" placeholder="e.g. 3:00 PM">
            <input type="text" id="inAct" placeholder="What are we doing?">
            <button onclick="addItin()" class="full-btn">ADD TO PLAN</button>
        </div>
    </div>

    <div class="card">
        <h3>🎒 Packing List</h3>
        <div id="packList"></div>
        <div class="form-box">
            <input type="text" id="packInput" placeholder="Add item...">
            <button onclick="addPackItem()" class="full-btn">ADD ITEM</button>
            <button onclick="clearPacking()" style="background:none; border:none; color:var(--neon-pink); cursor:pointer;">Clear All</button>
        </div>
    </div>

    <div class="card">
        <h3>😎 Crew Vibe Check</h3>
        <div id="vibeList"></div>
        <div class="form-box">
            <input type="text" id="vibeInput" placeholder="Current vibe?">
            <button onclick="updateVibe()" class="full-btn">UPDATE VIBE</button>
        </div>
    </div>

    <div class="card">
        <h3>🇲🇽 Bilingual Vibes</h3>
        <div id="spanishCard" onclick="flipCard()">
            <span id="esText">¡Hola!</span>
            <span id="enText">Hello!</span>
        </div>
        <button onclick="nextPhrase()" class="full-btn" style="margin-top:15px; background:var(--sun-yellow);">NEXT PHRASE</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZ8WZUAm0GQJF9Rq7mvjTK1KvTk7VMcqvJp7aEXDv_M3ikl_lj7QdfeFvASS45MaYC/exec'; 
    let myName = localStorage.getItem('mx_name');
    let packingItems = JSON.parse(localStorage.getItem('mx_packing')) || [{txt: "Passport", done: false}];

    const phrases = [
        {es: "¿Dónde está el baño?", en: "Where is the bathroom?"},
        {es: "Una cerveza mas, por favor", en: "One more beer, please"},
        {es: "La cuenta, por favor", en: "The check, please"},
        {es: "¿Cuánto cuesta?", en: "How much does it cost?"},
        {es: "¡Salud!", en: "Cheers!"},
        {es: "Sin picante", en: "Not spicy"},
        {es: "Está delicioso", en: "It's delicious"}
    ];

    function flipCard() {
        const en = document.getElementById('enText');
        en.style.display = (en.style.display === 'none' || en.style.display === '') ? 'block' : 'none';
    }

    function nextPhrase() {
        const p = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('esText').innerText = p.es;
        document.getElementById('enText').innerText = p.en;
        document.getElementById('enText').style.display = 'none';
    }

    function formatTime(t) {
        if (!t) return '--';
        if (typeof t === 'string' && t.includes('T')) {
            const timeStr = t.split('T')[1].substring(0, 5); 
            let [h, m] = timeStr.split(':');
            h = parseInt(h);
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${m} ${ampm}`;
        }
        return t; 
    }

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL + '?app=sb&v=' + Date.now());
            const data = await res.json();
            
            if (myName) {
                document.getElementById('overlay').style.display = 'none';
            } else {
                document.getElementById('nameList').innerHTML = data.status.slice(1).map(row => 
                    `<button class="name-btn" onclick="setName('${row[0]}')">${row[0]}</button>`
                ).join('');
            }

            document.getElementById('vibeList').innerHTML = data.status.slice(1).map(row => 
                `<div class="vibe-row"><span>${row[0]}</span><span class="vibe-status">${row[1] || '---'}</span></div>`
            ).join('');

            const rows = data.itinerary;
            const listDiv = document.getElementById('itinList');
            listDiv.innerHTML = '';
            const grouped = {};
            for (let i = 1; i < rows.length; i++) {
                const [day, time, act] = rows[i];
                if (!act) continue;
                if (!grouped[day]) grouped[day] = [];
                grouped[day].push({ time: formatTime(time), act });
            }
            ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"].forEach(day => {
                if (grouped[day]) {
                    listDiv.innerHTML += `<div class="day-header">${day}</div>`;
                    grouped[day].forEach(item => {
                        listDiv.innerHTML += `<div class="itin-row"><span class="itin-time">${item.time}</span><span class="itin-act">${item.act}</span></div>`;
                    });
                }
            });
            renderPacking();
            nextPhrase();
        } catch(e) { console.error(e); }
    }

    async function updateVibe() {
        const v = document.getElementById('vibeInput').value;
        if (!v || !myName) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ isSB: true, name: myName, vibe: v }) });
        document.getElementById('vibeInput').value = '';
        setTimeout(fetchData, 1000);
    }

    async function addItin() {
        const d = document.getElementById('inDay').value, t = document.getElementById('inTime').value, a = document.getElementById('inAct').value;
        if (!a) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addItin', isSB: true, day: d, time: t, activity: a }) });
        document.getElementById('inAct').value = '';
        document.getElementById('inTime').value = '';
        setTimeout(fetchData, 1000);
    }

    function renderPacking() {
        const list = document.getElementById('packList');
        list.innerHTML = packingItems.map((item, i) => `
            <div class="pack-item ${item.done ? 'done' : ''}">
                <span onclick="togglePack(${i})">${item.done ? '✅' : '⬜'} ${item.txt}</span>
                <button onclick="deletePack(${i})" style="background:none; border:none; color:red; font-size:1.2rem; cursor:pointer;">&times;</button>
            </div>
        `).join('');
        localStorage.setItem('mx_packing', JSON.stringify(packingItems));
    }
    function addPackItem() {
        const input = document.getElementById('packInput');
        if(!input.value) return;
        packingItems.push({txt: input.value, done: false});
        input.value = '';
        renderPacking();
    }
    function togglePack(i) { packingItems[i].done = !packingItems[i].done; renderPacking(); }
    function deletePack(i) { packingItems.splice(i, 1); renderPacking(); }
    function clearPacking() { if(confirm("Clear all?")) { packingItems = []; renderPacking(); } }
    function setName(n) { localStorage.setItem('mx_name', n); myName = n; fetchData(); }

    !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');

    setInterval(() => {
        const diff = new Date("April 13, 2026 16:00:00 EST").getTime() - new Date().getTime();
        document.getElementById('days').innerText = Math.max(0, Math.floor(diff / 86400000)).toString().padStart(2, '0');
        document.getElementById('hours').innerText = Math.max(0, Math.floor((diff % 86400000) / 3600000)).toString().padStart(2, '0');
        document.getElementById('mins').innerText = Math.max(0, Math.floor((diff % 3600000) / 60000)).toString().padStart(2, '0');
        document.getElementById('secs').innerText = Math.max(0, Math.floor((diff % 60000) / 1000)).toString().padStart(2, '0');
    }, 1000);

    fetchData();
</script>
</body>
</html>
