<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEXICO 2026</title>
    <style>
        :root { --neon-pink: #ff007f; --ocean-blue: #00d4ff; --sun-yellow: #fdbb2d; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Impact', sans-serif; background: black; color: white; min-height: 100vh; padding-bottom: 50px; overflow-x: hidden; }
        .hero { background: linear-gradient(to bottom, rgba(0,0,0,0.6), black), url('https://images.unsplash.com/photo-1552074284-5e88ef1aef18?q=80&w=1000&auto=format&fit=crop'); background-size: cover; padding: 30px 10px; text-align: center; border-bottom: 5px solid var(--neon-pink); }
        .main-head { font-size: 4.5rem; line-height: 0.85; text-shadow: 6px 6px var(--neon-pink); margin-bottom: 20px; text-transform: uppercase; }
        #countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; font-family: sans-serif; margin-bottom: 15px; }
        .unit span { display: block; font-size: 2.2rem; color: var(--sun-yellow); }
        .unit { font-size: 0.7rem; font-weight: bold; }
        
        .weather-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 400px; margin: 10px auto; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--ocean-blue); border-radius: 15px; min-height: 100px; align-items: center; }
        .w-day { font-size: 0.7rem; color: var(--ocean-blue); font-weight: bold; }
        .w-temp { font-size: 1.1rem; color: #fff; }
        .w-icon { width: 40px; height: 40px; margin: 0 auto; display: block; }

        .container { padding: 15px; font-family: sans-serif; }
        .card { background: var(--glass); padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(15px); }
        h3 { margin: 0 0 15px 0; color: var(--ocean-blue); border-bottom: 2px solid var(--ocean-blue); display: inline-block; text-transform: uppercase; }
        
        .day-header { color: var(--neon-pink); font-size: 1.8rem; border-bottom: 2px solid var(--neon-pink); margin: 25px 0 10px 0; text-transform: uppercase; font-family: 'Impact'; }
        .itin-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
        .itin-time { color: var(--ocean-blue); font-weight: 900; width: 85px; font-size: 0.85rem; flex-shrink: 0; }
        .itin-act { flex-grow: 1; font-weight: bold; font-size: 1rem; padding-right: 30px; }
        .del-btn { color: #ff4444; font-weight: bold; padding: 5px 10px; cursor: pointer; font-size: 1.2rem; opacity: 0.4; }
        .del-btn:hover { opacity: 1; }

        .vibe-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--glass); }
        .vibe-status { color: var(--sun-yellow); font-weight: bold; }
        
        #spanishCard { background: var(--neon-pink); color: white; padding: 30px 15px; border-radius: 20px; text-align: center; cursor: pointer; min-height: 100px; display: flex; flex-direction: column; justify-content: center; margin-top: 10px; }
        #esText { font-size: 1.6rem; font-weight: bold; }
        #enText { font-size: 1rem; opacity: 0.9; margin-top: 10px; display: none; font-style: italic; }

        .form-box { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        input, select { background: rgba(0,0,0,0.4); border: 2px solid var(--ocean-blue); color: #fff; padding: 12px; border-radius: 12px; font-size: 1rem; }
        .full-btn { background: var(--ocean-blue); border: none; padding: 15px; border-radius: 12px; font-family: 'Impact'; font-size: 1.2rem; cursor: pointer; color: black; width: 100%; margin-top: 10px; }
        
        #overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .name-btn { margin: 10px; padding: 20px; width: 280px; background: var(--sun-yellow); border: none; border-radius: 20px; font-size: 1.4rem; font-family: 'Impact'; color: black; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color:var(--neon-pink); font-size: 3.5rem;">MEXICO 2026</h1>
    <div id="nameList">Connecting...</div>
</div>

<div class="hero">
    <div class="main-head">MEXICO<br>2026</div>
    <div id="countdown">
        <div class="unit"><span id="days">00</span>DAYS</div>
        <div class="unit"><span id="hours">00</span>HRS</div>
        <div class="unit"><span id="mins">00</span>MIN</div>
        <div class="unit"><span id="secs">00</span>SEC</div>
    </div>
    <div id="weather-display" class="weather-grid">Loading Weather...</div>
</div>

<div class="container">
    <div class="card">
        <h3>📅 THE GAMEPLAN</h3>
        <div id="itinList"></div>
        <div class="form-box">
            <select id="inDay"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select>
            <input type="text" id="inTime" placeholder="Time"><input type="text" id="inAct" placeholder="Activity"><button onclick="addItin()" class="full-btn">ADD TO PLAN</button>
        </div>
    </div>

    <div class="card">
        <h3>😎 CREW VIBES</h3>
        <div id="vibeList"></div>
        <div class="form-box">
            <input type="text" id="vibeInput" placeholder="Update status..."><button onclick="updateVibe()" class="full-btn">UPDATE</button>
        </div>
    </div>

    <div class="card">
        <h3>🇲🇽 FLASHCARDS</h3>
        <div id="spanishCard" onclick="flipCard()">
            <span id="esText">Tap for Spanish</span>
            <span id="enText"></span>
        </div>
        <button onclick="nextPhrase()" class="full-btn" style="background:var(--sun-yellow);">NEXT</button>
    </div>
</div>

<script>
    const WEATHER_API_KEY = 'a953259cf067ae58338207db13580c6a'; 
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbza-bELEpB1xW4qwNVxRP3W6TIWGvUjVM4lUpKm5jPWd1qGl-vYKLxrLzhJc1sURU88/exec'; 
    let myName = localStorage.getItem('mx_name'), allPhrases = [];

    async function fetchWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=21.16&lon=-86.85&units=imperial&appid=${WEATHER_API_KEY}`);
            const data = await res.json();
            let html = '';
            for (let i = 0; i < data.list.length; i += 8) {
                const day = data.list[i];
                const date = new Date(day.dt * 1000).toLocaleDateString('en', {weekday: 'short'}).toUpperCase();
                html += `<div><div class="w-day">${date}</div><img src="https://openweathermap.org/img/wn/${day.weather[0].icon}.png" class="w-icon"><div class="w-temp">${Math.round(day.main.temp)}°</div></div>`;
            }
            document.getElementById('weather-display').innerHTML = html;
        } catch(e) { document.getElementById('weather-display').innerText = "Weather Warming Up..."; }
    }

    function flipCard() { const en = document.getElementById('enText'); en.style.display = (en.style.display === 'none' || en.style.display === '') ? 'block' : 'none'; }
    function nextPhrase() { if (!allPhrases.length) return; const p = allPhrases[Math.floor(Math.random() * allPhrases.length)]; document.getElementById('esText').innerText = p[0]; document.getElementById('enText').innerText = p[1]; document.getElementById('enText').style.display = 'none'; }

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL + '?app=sb&v=' + Date.now());
            const data = await res.json();
            if (myName) { document.getElementById('overlay').style.display = 'none'; } 
            else if (data.status) { document.getElementById('nameList').innerHTML = data.status.slice(1).map(row => `<button class="name-btn" onclick="setName('${row[0]}')">${row[0]}</button>`).join(''); }
            
            if (data.status) { document.getElementById('vibeList').innerHTML = data.status.slice(1).map(row => `<div class="vibe-row"><span>${row[0]}</span><span class="vibe-status">${row[1] || '---'}</span></div>`).join(''); }
            
            if (data.itinerary) {
                const rows = data.itinerary, listDiv = document.getElementById('itinList');
                listDiv.innerHTML = ''; const grouped = {};
                for (let i = 1; i < rows.length; i++) {
                    const [day, time, act] = rows[i]; if (!act) continue;
                    if (!grouped[day]) grouped[day] = [];
                    grouped[day].push({ time, act });
                }
                ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"].forEach(day => {
                    if (grouped[day]) {
                        listDiv.innerHTML += `<div class="day-header">${day}</div>`;
                        grouped[day].forEach(item => { 
                            listDiv.innerHTML += `
                                <div class="itin-row">
                                    <span class="itin-time">${item.time}</span>
                                    <span class="itin-act">${item.act}</span>
                                    <span class="del-btn" onclick="deleteItem('${day}','${item.time}','${item.act}')">×</span>
                                </div>`; 
                        });
                    }
                });
            }
            if (data.phrases) { allPhrases = data.phrases.slice(1); nextPhrase(); }
        } catch(e) { console.error(e); }
    }

    async function deleteItem(d, t, a) {
        if(!confirm("Delete this?")) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteItin', day: d, time: t, activity: a }) });
        setTimeout(fetchData, 1000);
    }

    async function updateVibe() {
        const v = document.getElementById('vibeInput').value; if (!v || !myName) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ isSB: true, name: myName, vibe: v }) });
        document.getElementById('vibeInput').value = ''; setTimeout(fetchData, 1000);
    }

    async function addItin() {
        const d = document.getElementById('inDay').value, t = document.getElementById('inTime').value, a = document.getElementById('inAct').value; if (!a) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addItin', isSB: true, day: d, time: t, activity: a }) });
        document.getElementById('inAct').value = ''; document.getElementById('inTime').value = ''; setTimeout(fetchData, 1000);
    }

    function setName(n) { localStorage.setItem('mx_name', n); myName = n; fetchData(); }
    setInterval(() => {
        const diff = new Date("April 13, 2026 16:00:00 EST").getTime() - new Date().getTime();
        document.getElementById('days').innerText = Math.max(0, Math.floor(diff / 86400000)).toString().padStart(2, '0');
        document.getElementById('hours').innerText = Math.max(0, Math.floor((diff % 86400000) / 3600000)).toString().padStart(2, '0');
        document.getElementById('mins').innerText = Math.max(0, Math.floor((diff % 3600000) / 60000)).toString().padStart(2, '0');
        document.getElementById('secs').innerText = Math.max(0, Math.floor((diff % 60000) / 1000)).toString().padStart(2, '0');
    }, 1000);

    fetchData(); fetchWeather();
</script>
</body>
</html>
