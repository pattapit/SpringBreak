<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEXICO 2026 | DALE!</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon-pink: #ff007f; --ocean-blue: #00d4ff; --sun-yellow: #fdbb2d; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Impact', 'Arial Black', sans-serif; background: black; color: white; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden; }
        
        /* MASSIVE HEADER & COUNTDOWN */
        .hero { background: linear-gradient(to bottom, rgba(0,0,0,0.5), black), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1000&q=80'); background-size: cover; padding: 60px 10px; text-align: center; border-bottom: 5px solid var(--neon-pink); }
        .main-head { font-size: 5rem; line-height: 0.85; letter-spacing: 2px; color: white; text-shadow: 5px 5px var(--neon-pink); margin-bottom: 25px; text-transform: uppercase; }
        
        #countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .unit span { display: block; font-size: 2.8rem; line-height: 1; color: var(--sun-yellow); text-shadow: 2px 2px black; }
        .unit { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: white; font-family: sans-serif; font-weight: bold; }

        .container { padding: 15px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .card { background: var(--glass); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px); }
        h3 { margin: 0 0 15px 0; color: var(--ocean-blue); text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem; border-bottom: 2px solid var(--ocean-blue); display: inline-block; }

        /* Shared Itinerary UI */
        .itin-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .itin-text { flex-grow: 1; padding-right: 10px; font-weight: bold; color: var(--sun-yellow); font-size: 1.1rem; }
        
        /* Forms */
        .input-group { margin-top: 15px; display: flex; gap: 8px; }
        input { background: rgba(0,0,0,0.4); border: 2px solid var(--ocean-blue); color: white; padding: 12px; border-radius: 10px; flex-grow: 1; font-size: 1rem; }
        .add-btn { background: var(--ocean-blue); border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; color: black; }

        /* General Delete Button */
        .del { color: var(--neon-pink); font-weight: bold; padding: 0 10px; font-size: 1.8rem; cursor: pointer; line-height: 1; }
        
        /* Duo Flashcards */
        .duo-card { text-align: center; background: rgba(88, 204, 2, 0.2); border: 3px solid #58cc02; padding: 30px 20px; border-radius: 25px; cursor: pointer; }

        /* Vibe Buttons */
        .vibe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .vibe-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 10px 5px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }

        .dale-fab { position: fixed; bottom: 20px; right: 20px; width: 80px; height: 80px; border-radius: 50%; background: var(--neon-pink); border: 4px solid white; color: white; font-weight: 900; font-size: 1.2rem; z-index: 1000; box-shadow: 0 0 20px var(--neon-pink); }
        
        #overlay { position: fixed; inset: 0; background: #0f0c29; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .name-btn { margin: 8px; padding: 20px; width: 270px; background: var(--sun-yellow); border: none; border-radius: 15px; font-weight: bold; font-size: 1.3rem; color: black; box-shadow: 4px 4px 0 black; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color:var(--neon-pink); font-size: 5rem; margin:0;">DALE!</h1>
    <p style="letter-spacing:3px; font-family: sans-serif; font-weight:bold;">WHO ARE YOU?</p>
    <div id="nameList">Loading roster...</div>
</div>

<div class="hero">
    <div class="main-head">MEXICO<br>2026</div>
    <div id="countdown">
        <div class="unit"><span id="days">00</span>Days</div>
        <div class="unit"><span id="hours">00</span>Hrs</div>
        <div class="unit"><span id="mins">00</span>Min</div>
        <div class="unit"><span id="secs">00</span>Sec</div>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3>📅 Shared Gameplan</h3>
        <div id="itinList"></div>
        <div class="input-group">
            <input type="text" id="itinIn" placeholder="e.g. 4PM Boat Tour">
            <button onclick="addItin()" class="add-btn">ADD</button>
        </div>
    </div>

    <div class="card">
        <h3 style="color: var(--neon-pink); border-color: var(--neon-pink);">🎒 Private Gear</h3>
        <div id="packingList"></div>
        <div class="input-group">
            <input type="text" id="pIn" placeholder="Pack sunscreen...">
            <button onclick="addPack()" class="add-btn" style="background: var(--neon-pink); color: white;">ADD</button>
        </div>
    </div>

    <div class="card duo-card" onclick="nextPhrase()">
        <small style="color:#58cc02; font-weight:900; letter-spacing:2px; display:block; margin-bottom:10px;">SPANISH SESH 🦉</small>
        <h2 id="pEng">Tap to start!</h2>
        <h2 id="pEsp" style="color: #58cc02; display:none;">¡Toca para empezar!</h2>
        <p id="pHint" style="font-size:0.75rem; color:gray; margin-top:20px;">(Tap to reveal / next)</p>
    </div>

    <div class="card" style="border: 2px solid var(--sun-yellow);">
        <h3>🍹 Group Vibes</h3>
        <div id="statusList" style="font-size: 1rem; margin-bottom: 15px; line-height: 1.5; font-family: sans-serif;"></div>
        <div class="vibe-grid">
            <button class="vibe-btn" onclick="updateVibe('🍹 Drinkin')">🍹 Drinkin</button>
            <button class="vibe-btn" onclick="updateVibe('😴 Napping')">😴 Napping</button>
            <button class="vibe-btn" onclick="updateVibe('🌊 Beach')">🌊 Beach</button>
            <button class="vibe-btn" onclick="updateVibe('🌮 Eating')">🌮 Eating</button>
            <button class="vibe-btn" onclick="updateVibe('💃 Dale!')">💃 Dale!</button>
            <button class="vibe-btn" onclick="updateVibe('✈️ Traveling')">✈️ Traveling</button>
        </div>
    </div>
</div>

<button class="dale-fab" id="musicBtn" onclick="toggleMusic()">DALE!</button>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZBX5Trw0X1llZK0mreE_wzNRJojqa8UCzb-e7s9ADn1Kuobz5-QRIkBe6rDQdejk/exec'; 
    let myName = localStorage.getItem('mx_name');
    const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'); 
    audio.loop = true;

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL + '?action=getData');
            const data = await res.json();
            
            if (!myName) {
                document.getElementById('nameList').innerHTML = data.status.map(row => 
                    `<button class="name-btn" onclick="setName('${row[0]}')">${row[0]}</button>`
                ).join('');
            } else { document.getElementById('overlay').style.display = 'none'; }

            document.getElementById('statusList').innerHTML = data.status.map(row => 
                `<div><b>${row[0]}:</b> ${row[1] || 'Chillin'}</div>`
            ).join('');

            document.getElementById('itinList').innerHTML = data.itinerary.map((row, i) => 
                `<div class="itin-item">
                    <div class="itin-text">${row[0]}</div>
                    <span class="del" onclick="deleteItin('${row[0]}')">×</span>
                </div>`
            ).join('');
        } catch(e) { console.log("Fetch Error", e); }
    }

    // SHARED ITINERARY ACTIONS
    async function addItin() {
        const val = document.getElementById('itinIn').value;
        if(!val) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'addItin', text: val }) });
        document.getElementById('itinIn').value = '';
        setTimeout(fetchData, 1500);
    }

    async function deleteItin(text) {
        if(!confirm("Remove this activity?")) return;
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delItin', text: text }) });
        setTimeout(fetchData, 1000);
    }

    function setName(name) {
        localStorage.setItem('mx_name', name);
        myName = name;
        document.getElementById('overlay').style.display = 'none';
        fetchData();
    }

    async function updateVibe(vibe) {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: myName, vibe: vibe }) });
        setTimeout(fetchData, 1200);
    }

    // PACKING (LOCAL)
    let pItems = JSON.parse(localStorage.getItem('mx_p')) || [];
    function renderP() {
        document.getElementById('packingList').innerHTML = pItems.map((it, i) => 
            `<div class="pack-item"><span>${it}</span><span class="del" onclick="remP(${i})">×</span></div>`).join('');
        localStorage.setItem('mx_p', JSON.stringify(pItems));
    }
    function addPack() { const i = document.getElementById('pIn'); if(i.value){pItems.push(i.value); i.value=''; renderP();}}
    function remP(i) { pItems.splice(i,1); renderP(); }
    renderP();

    // MUSIC
    function toggleMusic() { 
        const btn = document.getElementById('musicBtn');
        if(audio.paused) { 
            audio.play().catch(e => console.log("Interaction required")); 
            btn.innerText = "STOP"; btn.style.background = "#58cc02";
        } else { 
            audio.pause(); btn.innerText = "DALE!"; btn.style.background = "var(--neon-pink)";
        }
    }

    // SPANISH DICTIONARY
    const phrases = [
        {e:"Where is the pool?", s:"¿Dónde está la piscina?"}, {e:"Another round!", s:"¡Otra ronda!"},
        {e:"I need a taco.", s:"Necesito un taco."}, {e:"Where is the cart?", s:"¿Dónde está el carrito?"},
        {e:"Cold beer!", s:"¡Cerveza fría!"}, {e:"I am drunk.", s:"Estoy pedo."},
        {e:"Check, please!", s:"¡La cuenta!"}, {e:"Wait a second.", s:"Ahorita."},
        {e:"I'm hungry.", s:"Tengo hambre."}, {e:"Cheers!", s:"¡Salud!"},
        {e:"Too much tequila.", s:"Demasiado tequila."}, {e:"Delicious!", s:"¡Riquísimo!"},
        {e:"Beautiful day!", s:"¡Día hermoso!"}, {e:"Where is the beach?", s:"¿Dónde está la playa?"}
    ];
    let pIdx = 0;
    function nextPhrase() {
        const s = document.getElementById('pEsp');
        const h = document.getElementById('pHint');
        if(s.style.display === 'none') { s.style.display = 'block'; h.innerText = "(Tap for next)"; }
        else { 
            pIdx = Math.floor(Math.random() * phrases.length); 
            document.getElementById('pEng').innerText = phrases[pIdx].e; 
            s.innerText = phrases[pIdx].s; s.style.display = 'none'; h.innerText = "(Tap to reveal)";
        }
    }

    // Countdown
    const target = new Date("April 13, 2026 16:00:00 EST").getTime();
    setInterval(() => {
        const diff = target - new Date().getTime();
        document.getElementById('days').innerText = Math.max(0, Math.floor(diff / 86400000));
        document.getElementById('hours').innerText = Math.max(0, Math.floor((diff % 86400000) / 3600000));
        document.getElementById('mins').innerText = Math.max(0, Math.floor((diff % 3600000) / 60000));
        document.getElementById('secs').innerText = Math.max(0, Math.floor((diff % 60000) / 1000));
    }, 1000);

    fetchData();
</script>
</body>
</html>
