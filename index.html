<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEXICO 2026 | DALE!</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon-pink: #ff007f; --ocean-blue: #00d4ff; --sun-yellow: #fdbb2d; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Impact', 'Arial Black', sans-serif; background: black; color: white; min-height: 100vh; padding-bottom: 120px; }
        
        /* MASSIVE COUNTDOWN */
        .hero { background: linear-gradient(to bottom, rgba(0,0,0,0.3), black), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1000&q=80'); background-size: cover; padding: 50px 10px; text-align: center; border-bottom: 5px solid var(--neon-pink); }
        #countdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; }
        .unit span { display: block; font-size: 3.2rem; line-height: 1; color: var(--sun-yellow); text-shadow: 3px 3px var(--neon-pink); }
        .unit { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: white; font-family: sans-serif; font-weight: bold; }

        .container { padding: 15px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .card { background: var(--glass); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px); }
        h3 { margin: 0 0 15px 0; color: var(--ocean-blue); text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem; border-bottom: 2px solid var(--ocean-blue); display: inline-block; }

        /* Itinerary Custom Styling */
        .itin-row { margin-bottom: 15px; padding: 10px; border-left: 4px solid var(--sun-yellow); background: rgba(255,255,255,0.03); border-radius: 0 10px 10px 0; }
        .itin-date { font-weight: 900; color: var(--neon-pink); font-size: 1rem; margin-bottom: 3px; }
        .edit-sheet-btn { display: block; width: 100%; padding: 12px; background: #34a853; border: none; border-radius: 10px; color: white; font-weight: bold; text-decoration: none; text-align: center; margin-top: 10px; box-sizing: border-box; }

        /* Packing List */
        .pack-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .del { color: var(--neon-pink); font-weight: bold; padding: 0 10px; font-size: 1.5rem; }
        input { background: rgba(0,0,0,0.4); border: 2px solid var(--ocean-blue); color: white; padding: 12px; border-radius: 10px; width: 55%; font-size: 1rem; }
        
        /* Duo Flashcards */
        .duo-card { text-align: center; background: rgba(88, 204, 2, 0.2); border: 3px solid #58cc02; padding: 30px 20px; border-radius: 25px; cursor: pointer; position: relative; }

        /* Status at Bottom */
        .vibe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .vibe-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 10px 5px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }

        .dale-fab { position: fixed; bottom: 20px; right: 20px; width: 75px; height: 75px; border-radius: 50%; background: var(--neon-pink); border: 4px solid white; color: white; font-weight: 900; font-size: 1.1rem; z-index: 1000; box-shadow: 0 0 20px var(--neon-pink); }
        
        #overlay { position: fixed; inset: 0; background: #0f0c29; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .name-btn { margin: 8px; padding: 18px; width: 260px; background: var(--sun-yellow); border: none; border-radius: 15px; font-weight: bold; font-size: 1.2rem; color: black; box-shadow: 4px 4px 0 black; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color:var(--neon-pink); font-size: 4rem; margin-bottom:10px;">DALE!</h1>
    <p style="letter-spacing:2px; font-family: sans-serif;">WHO ARE YOU?</p>
    <div id="nameList">Loading roster...</div>
</div>

<div class="hero">
    <div style="letter-spacing: 8px; font-size: 1rem; font-weight: 900;">MEXICO 2026</div>
    <div id="countdown">
        <div class="unit"><span id="days">00</span>Days</div>
        <div class="unit"><span id="hours">00</span>Hrs</div>
        <div class="unit"><span id="mins">00</span>Min</div>
        <div class="unit"><span id="secs">00</span>Sec</div>
    </div>
</div>

<div class="container">
    <div class="card">
        <h3>📅 The Gameplan</h3>
        <div id="itinList"></div>
        <a href="https://docs.google.com/spreadsheets/d/19lQ590a_E3YnAqdlkvnMkmMi1SfOv9zXdcRR23ap1Zk/edit?usp=sharing" target="_blank" class="edit-sheet-btn">✍️ EDIT FULL ITINERARY</a>
    </div>

    <div class="card">
        <h3>🎒 Private Gear List</h3>
        <div id="packingList"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <input type="text" id="pIn" placeholder="Add gear...">
            <button onclick="addItem()" style="background:var(--ocean-blue); border:none; padding:12px; border-radius:10px; font-weight:bold; flex-grow:1; color:black;">ADD</button>
        </div>
    </div>

    <div class="card duo-card" onclick="nextPhrase()">
        <small style="color:#58cc02; font-weight:900; letter-spacing:2px; display:block; margin-bottom:10px; font-family: sans-serif;">SPANISH SESH 🦉</small>
        <h2 id="pEng">Tap for more phrases!</h2>
        <h2 id="pEsp" style="color: #58cc02; display:none;">¡Toca para más frases!</h2>
        <p id="pHint" style="font-size:0.75rem; color:gray; margin-top:20px; font-family: sans-serif;">(Tap to reveal / next)</p>
    </div>

    <div class="card" style="border: 2px solid var(--sun-yellow);">
        <h3>🍹 Group Vibes</h3>
        <div id="statusList" style="font-size: 0.9rem; margin-bottom: 15px; font-family: sans-serif;"></div>
        <div class="vibe-grid">
            <button class="vibe-btn" onclick="updateVibe('🍹 Drinkin')">🍹 Drinkin</button>
            <button class="vibe-btn" onclick="updateVibe('😴 Napping')">😴 Napping</button>
            <button class="vibe-btn" onclick="updateVibe('🌊 Beach')">🌊 Beach</button>
            <button class="vibe-btn" onclick="updateVibe('🌮 Eating')">🌮 Eating</button>
            <button class="vibe-btn" onclick="updateVibe('💃 Dale!')">💃 Dale!</button>
            <button class="vibe-btn" onclick="updateVibe('✈️ Traveling')">✈️ Traveling</button>
        </div>
    </div>
</div>

<button class="dale-fab" id="musicBtn" onclick="toggleMusic()">DALE!</button>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNEVF8mqq96MGhHqerjnY0Ho2ouKjc6Wp3etKuEAF0C0j6oDtbON42mpWkhwVRAnNf/exec'; 
    let myName = localStorage.getItem('mx_name');
    const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'); 
    audio.loop = true;

    const phrases = [
        {e:"Where is the pool?", s:"¿Dónde está la piscina?"},
        {e:"Another round, please!", s:"¡Otra ronda, por favor!"},
        {e:"I need a taco.", s:"Necesito un taco."},
        {e:"Where are the golf carts?", s:"¿Dónde están los carritos de golf?"},
        {e:"The ocean is beautiful.", s:"El océano es hermoso."},
        {e:"I am sunbathing.", s:"Estoy tomando el sol."},
        {e:"Too much tequila.", s:"Demasiado tequila."},
        {e:"Where is the bus?", s:"¿Dónde está el autobús?"},
        {e:"Check, please!", s:"¡La cuenta, por favor!"},
        {e:"I love Mexico.", s:"Amo México."},
        {e:"Let's go swimming.", s:"Vamos a nadar."},
        {e:"Is it walking distance?", s:"¿Se puede ir caminando?"},
        {e:"I need sunscreen.", s:"Necesito bloqueador solar."},
        {e:"Where is the party?", s:"¿Dónde está la fiesta?"},
        {e:"Spicy or not spicy?", s:"¿Pica o no pica?"},
        {e:"Cold beer, please.", s:"Cerveza fría, por favor."},
        {e:"What's up, dude?", s:"¿Qué onda, güey?"},
        {e:"Hurry up!", s:"¡Órale!"},
        {e:"I am drunk.", s:"Estoy pedo."},
        {e:"To the beach!", s:"¡A la playa!"},
        {e:"Where is the bathroom?", s:"¿Dónde está el baño?"},
        {e:"Cheers!", s:"¡Salud!"},
        {e:"Enjoy your meal!", s:"¡Buen provecho!"},
        {e:"Where is the hotel?", s:"¿Dónde está el hotel?"},
        {e:"Sparkling or still?", s:"¿Con gas o sin gas?"},
        {e:"Beautiful day!", s:"¡Día hermoso!"},
        {e:"The sand is hot.", s:"La arena está caliente."},
        {e:"Straight ahead.", s:"Todo derecho."},
        {e:"To the left.", s:"A la izquierda."},
        {e:"To the right.", s:"A la derecha."},
        {e:"Let's take a photo.", s:"Vamos a tomar una foto."},
        {e:"I am happy.", s:"Estoy feliz."},
        {e:"Pura vida!", s:"¡Pura vida!"},
        {e:"See you tomorrow.", s:"Hasta mañana."},
        {e:"What do you recommend?", s:"¿Qué recomienda?"},
        {e:"I am full.", s:"Estoy lleno."},
        {e:"Let's go to the pool.", s:"Vamos a la piscina."},
        {e:"I need a nap.", s:"Necesito una siesta."},
        {e:"Where can I buy a hat?", s:"¿Dónde puedo comprar un sombrero?"},
        {e:"I forgot my flip flops.", s:"Olvidé mis chanclas."},
        {e:"Watch the sunset.", s:"Ver el atardecer."},
        {e:"Are you ready?", s:"¿Estás listo?"},
        {e:"Let's go!", s:"¡Vámonos!"},
        {e:"I need coffee.", s:"Necesito café."},
        {e:"I'm joking!", s:"¡Es broma!"}
    ];

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL + '?action=getData');
            const data = await res.json();
            
            if (!myName) {
                document.getElementById('nameList').innerHTML = data.status.map(row => 
                    `<button class="name-btn" onclick="setName('${row[0]}')">${row[0]}</button>`
                ).join('');
            } else { document.getElementById('overlay').style.display = 'none'; }

            document.getElementById('statusList').innerHTML = data.status.map(row => 
                `<div style="padding: 5px 0; border-bottom:1px solid rgba(255,255,255,0.05)"><b>${row[0]}:</b> ${row[1] || 'Chillin'}</div>`
            ).join('');

            document.getElementById('itinList').innerHTML = data.itinerary.map(row => 
                `<div class="itin-row"><div class="itin-date">${row[0]}</div><div>${row[1]}</div></div>`
            ).join('');
        } catch(e) { console.log(e); }
    }

    function setName(name) {
        localStorage.setItem('mx_name', name);
        myName = name;
        document.getElementById('overlay').style.display = 'none';
        fetchData();
    }

    async function updateVibe(vibe) {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: myName, vibe: vibe }) });
        setTimeout(fetchData, 1200);
    }

    const target = new Date("April 13, 2026 16:00:00 EST").getTime();
    setInterval(() => {
        const diff = target - new Date().getTime();
        document.getElementById('days').innerText = Math.max(0, Math.floor(diff / 86400000));
        document.getElementById('hours').innerText = Math.max(0, Math.floor((diff % 86400000) / 3600000));
        document.getElementById('mins').innerText = Math.max(0, Math.floor((diff % 3600000) / 60000));
        document.getElementById('secs').innerText = Math.max(0, Math.floor((diff % 60000) / 1000));
    }, 1000);

    let pItems = JSON.parse(localStorage.getItem('mx_p')) || [];
    function renderP() {
        document.getElementById('packingList').innerHTML = pItems.map((it, i) => 
            `<div class="pack-item"><span>${it}</span><span class="del" onclick="remP(${i})">×</span></div>`).join('');
        localStorage.setItem('mx_p', JSON.stringify(pItems));
    }
    function addItem() { const i = document.getElementById('pIn'); if(i.value){pItems.push(i.value); i.value=''; renderP();}}
    function remP(i) { pItems.splice(i,1); renderP(); }
    renderP();

    let pIdx = 0;
    function nextPhrase() {
        const s = document.getElementById('pEsp');
        const h = document.getElementById('pHint');
        if(s.style.display === 'none') { 
            s.style.display = 'block'; 
            h.innerText = "(Tap for next phrase)";
        } else { 
            pIdx = Math.floor(Math.random() * phrases.length); 
            document.getElementById('pEng').innerText = phrases[pIdx].e; 
            s.innerText = phrases[pIdx].s; 
            s.style.display = 'none'; 
            h.innerText = "(Tap to reveal Spanish)";
        }
    }

    function toggleMusic() { 
        const btn = document.getElementById('musicBtn');
        if(audio.paused) { 
            audio.play().catch(e => console.log("Music error")); 
            btn.innerText = "STOP"; 
            btn.style.background = "#58cc02";
        } else { 
            audio.pause(); 
            btn.innerText = "DALE!"; 
            btn.style.background = "var(--neon-pink)";
        }
    }
    fetchData();
</script>
</body>
</html>
